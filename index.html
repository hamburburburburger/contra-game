<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魂斗罗 - Contra HTML5</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  border: 2px solid #333;
  image-rendering: pixelated;
}
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}
#ui-overlay.active { pointer-events: all; }
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  color: #fff;
  text-align: center;
  padding: 40px;
  background: rgba(0,0,0,0.85);
  border-radius: 16px;
  border: 2px solid #ff4444;
}
.screen.visible { display: flex; }
.screen h1 {
  font-size: 48px;
  color: #ff4444;
  text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
  margin-bottom: 10px;
  letter-spacing: 8px;
}
.screen h2 {
  font-size: 28px;
  color: #ffaa00;
  margin-bottom: 20px;
}
.screen p {
  font-size: 16px;
  color: #ccc;
  margin: 5px 0;
  line-height: 1.8;
}
.screen .highlight { color: #ff4444; font-weight: bold; }
.btn {
  margin-top: 20px;
  padding: 12px 40px;
  font-size: 20px;
  font-family: 'Courier New', monospace;
  background: #ff4444;
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  pointer-events: all;
}
.btn:hover { background: #ff6666; transform: scale(1.05); }
.controls {
  margin-top: 15px;
  padding: 15px;
  border: 1px solid #555;
  border-radius: 8px;
  background: rgba(50,50,50,0.3);
}
.controls h3 { color: #ffaa00; margin-bottom: 8px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay" class="active">
  <div id="startScreen" class="screen visible">
    <h1>魂 斗 罗</h1>
    <h2>CONTRA HTML5</h2>
    <p>现代重制版</p>
    <div class="controls">
      <h3>P1 玩家</h3>
      <p>A/D - 左右移动 | W - 跳跃</p>
      <p>S - 趴下 | 空格 - 射击</p>
      <p>Q - 切换武器</p>
    </div>
    <div class="controls">
      <h3>P2 玩家</h3>
      <p>方向键 - 移动/跳跃</p>
      <p>Enter - 射击 | Numpad0 - 切换武器</p>
    </div>
    <button class="btn" id="startBtn">开始游戏</button>
    <p style="margin-top:10px;font-size:12px;color:#888;">按 ENTER 也可以开始</p>
  </div>
  <div id="gameOverScreen" class="screen">
    <h1>GAME OVER</h1>
    <p>最终分数: <span class="highlight" id="finalScore">0</span></p>
    <p>击杀数: <span class="highlight" id="finalKills">0</span></p>
    <button class="btn" id="restartBtn">重新开始</button>
  </div>
  <div id="victoryScreen" class="screen">
    <h1 style="color:#44ff44;text-shadow:0 0 20px #00ff00;">MISSION COMPLETE</h1>
    <h2 style="color:#44ff44;">任务完成!</h2>
    <p>最终分数: <span class="highlight" id="victoryScore">0</span></p>
    <p>击杀数: <span class="highlight" id="victoryKills">0</span></p>
    <button class="btn" id="playAgainBtn">再来一次</button>
  </div>
  <div id="pauseScreen" class="screen">
    <h2>暂停</h2>
    <p>按 ESC 继续</p>
  </div>
</div>
<script src="contra.js"></script>
</body>
</html>
